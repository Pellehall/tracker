<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snitt Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 520px;
  padding: 14px;
}

h1 { text-align: center; }

.card {
  background: #1e293b;
  padding: 14px;
  border-radius: 16px;
  margin-bottom: 14px;
}

.row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.row button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #334155;
  color: white;
  font-size: 16px;
}

.row input {
  flex: 2;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

label {
  display: block;
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
}

input[type="range"] {
  width: 100%;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
  font-size: 16px;
}

.primary { background: #3b82f6; color: white; }
.danger { background: #ef4444; color: white; }

.entry {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
}

#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #111827;
  padding: 10px 14px;
  border-radius: 12px;
  opacity: 0;
  transition: 0.2s;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-5px);
}
</style>
</head>

<body>

<div class="app">

<h1>📊 Snitt Tracker</h1>

<div class="card">

<div class="row">
  <button id="prev">⬅️</button>
  <input type="date" id="date">
  <button id="next">➡️</button>
</div>

<label>Energi <span id="eVal">3</span></label>
<input type="range" id="energy" min="1" max="5" value="3">

<label>Fokus <span id="fVal">3</span></label>
<input type="range" id="focus" min="1" max="5" value="3">

<label>Plan <span id="pVal">0</span></label>
<input type="range" id="plan" min="0" max="1" step="1" value="0">

<button class="primary" id="save">💾 Spara</button>
<button id="export">⬇️ Excel</button>
<button onclick="openCharts()">📊 Diagram</button>

</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div id="history"></div>

</div>

<div id="toast"></div>

<script>

const dateEl = document.getElementById("date");
const energy = document.getElementById("energy");
const focus = document.getElementById("focus");
const plan = document.getElementById("plan");

const eVal = document.getElementById("eVal");
const fVal = document.getElementById("fVal");
const pVal = document.getElementById("pVal");

const toast = document.getElementById("toast");

dateEl.value = new Date().toISOString().split("T")[0];

// toast
function show(msg){
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),2000);
}

// sliders
energy.oninput = () => eVal.textContent = energy.value;
focus.oninput = () => fVal.textContent = focus.value;
plan.oninput = () => pVal.textContent = plan.value;

// storage (bakåtkompatibel)
const get = () => {
  const data = JSON.parse(localStorage.getItem("tracker") || "[]");

  return data.map(e => ({
    ...e,
    plan: e.plan ?? e.mood ?? 0
  }));
};

const set = (d) => localStorage.setItem("tracker", JSON.stringify(d));

// snitt
function snitt(e){
  return (e.energy + e.focus + e.plan) / 3;
}

// date nav
function moveDay(offset){
  const d = new Date(dateEl.value);
  d.setDate(d.getDate() + offset);
  dateEl.value = d.toISOString().split("T")[0];
}

// save
function save(){
  const entry = {
    date: dateEl.value,
    energy: +energy.value,
    focus: +focus.value,
    plan: +plan.value
  };

  const data = get();
  const i = data.findIndex(d => d.date === entry.date);

  i >= 0 ? data[i] = entry : data.push(entry);

  set(data);
  render();
  show("Sparat ✅");

  const next = new Date(dateEl.value);
  next.setDate(next.getDate() + 1);
  dateEl.value = next.toISOString().split("T")[0];

  energy.value = 3;
  focus.value = 3;
  plan.value = 0;

  eVal.textContent = 3;
  fVal.textContent = 3;
  pVal.textContent = 0;
}

// delete
function deleteEntry(date){
  set(get().filter(d => d.date !== date));
  render();
  show("Borttaget 🗑️");
}

// edit
function editEntry(e){
  dateEl.value = e.date;
  energy.value = e.energy;
  focus.value = e.focus;
  plan.value = e.plan;

  eVal.textContent = e.energy;
  fVal.textContent = e.focus;
  pVal.textContent = e.plan;

  show("Redigerar ✏️");
}

// excel
function exportExcel(){
  const data = get().map(e => ({
    Datum: e.date,
    Energi: e.energy,
    Fokus: e.focus,
    Plan: e.plan,
    Snitt: snitt(e).toFixed(2)
  }));

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Snitt");
  XLSX.writeFile(wb, "snitt.xlsx");

  show("Export klar 📊");
}

// chart
let chart;

function draw(){
  const data = get().sort((a,b)=>new Date(a.date)-new Date(b.date));

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:data.map(d=>d.date),
      datasets:[
        {label:"Energi",data:data.map(d=>d.energy),borderColor:"#3b82f6"},
        {label:"Fokus",data:data.map(d=>d.focus),borderColor:"#22c55e"},
        {label:"Plan",data:data.map(d=>d.plan),borderColor:"#f59e0b"}
      ]
    },
    options:{scales:{y:{min:0,max:5}}}
  });
}

// render
function render(){
  draw();

  const h = document.getElementById("history");
  const data = get().slice().reverse();

  h.innerHTML = "<h3>Historik</h3>";

  data.forEach(e=>{
    const div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <strong>${e.date}</strong><br>
      ⚡ ${e.energy} | 🎯 ${e.focus} | 🧠 Plan: ${e.plan}<br>
      Snitt: ${snitt(e).toFixed(1)}
    `;

    const editBtn = document.createElement("button");
    editBtn.textContent = "✏️";
    editBtn.onclick = () => editEntry(e);

    const delBtn = document.createElement("button");
    delBtn.textContent = "🗑️";
    delBtn.className = "danger";
    delBtn.onclick = () => deleteEntry(e.date);

    div.appendChild(editBtn);
    div.appendChild(delBtn);

    h.appendChild(div);
  });
}

// nav
document.getElementById("save").onclick = save;
document.getElementById("export").onclick = exportExcel;
document.getElementById("prev").onclick = () => moveDay(-1);
document.getElementById("next").onclick = () => moveDay(1);

function openCharts(){
  window.location = "diagram.html";
}

render();

</script>

<script>
if("serviceWorker"in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
