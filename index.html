<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #0f172a;
  color: white;
  padding: 16px;
}

h1 { text-align: center; }

.card {
  background: #1e293b;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 16px;
}

input[type="range"] {
  width: 100%;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-top: 8px;
  cursor: pointer;
}

.primary { background: #3b82f6; color: white; }
.danger { background: #ef4444; color: white; }

.entry {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}

small { opacity: 0.7; }
</style>
</head>

<body>

<h1>📊 Tracker</h1>

<div class="card">
  <input type="date" id="date">

  <label>Energi: <span id="energyVal">5</span></label>
  <input type="range" id="energy" min="1" max="10" value="5">

  <label>Fokus: <span id="focusVal">5</span></label>
  <input type="range" id="focus" min="1" max="10" value="5">

  <label>Humör: <span id="moodVal">5</span></label>
  <input type="range" id="mood" min="1" max="10" value="5">

  <button class="primary" id="saveBtn">💾 Spara</button>
  <button id="exportBtn">⬇️ Excel</button>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div id="history"></div>

<script>
const dateEl = document.getElementById("date");
const energy = document.getElementById("energy");
const focus = document.getElementById("focus");
const mood = document.getElementById("mood");

const energyVal = document.getElementById("energyVal");
const focusVal = document.getElementById("focusVal");
const moodVal = document.getElementById("moodVal");

const saveBtn = document.getElementById("saveBtn");
const exportBtn = document.getElementById("exportBtn");

dateEl.value = new Date().toISOString().split("T")[0];

// slider updates
energy.oninput = () => energyVal.innerText = energy.value;
focus.oninput = () => focusVal.innerText = focus.value;
mood.oninput = () => moodVal.innerText = mood.value;

// storage safety
function getData() {
  try {
    return JSON.parse(localStorage.getItem("trackerData")) || [];
  } catch {
    return [];
  }
}

function saveData(data) {
  localStorage.setItem("trackerData", JSON.stringify(data));
}

function saveEntry() {
  if (!dateEl.value) return alert("Välj datum");

  const entry = {
    date: dateEl.value,
    energy: Number(energy.value),
    focus: Number(focus.value),
    mood: Number(mood.value)
  };

  let data = getData();
  const i = data.findIndex(d => d.date === entry.date);

  if (i >= 0) data[i] = entry;
  else data.push(entry);

  saveData(data);
  render();

  alert("Sparat!");
}

function deleteEntry(date) {
  saveData(getData().filter(d => d.date !== date));
  render();
}

function editEntry(entry) {
  dateEl.value = entry.date;
  energy.value = entry.energy;
  focus.value = entry.focus;
  mood.value = entry.mood;

  energyVal.innerText = entry.energy;
  focusVal.innerText = entry.focus;
  moodVal.innerText = entry.mood;

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function exportExcel() {
  const data = getData();
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Tracker");
  XLSX.writeFile(wb, "tracker.xlsx");
}

// chart
let chart;

function renderChart(data) {
  const ctx = document.getElementById("chart");

  const sorted = data.sort((a, b) => new Date(a.date) - new Date(b.date));

  const labels = sorted.map(d => d.date);

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Energi", data: sorted.map(d => d.energy), borderColor: "#3b82f6" },
        { label: "Fokus", data: sorted.map(d => d.focus), borderColor: "#22c55e" },
        { label: "Humör", data: sorted.map(d => d.mood), borderColor: "#f59e0b" }
      ]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          min: 0,
          max: 10
        }
      }
    }
  });
}

// render UI
function render() {
  const data = getData().sort((a, b) => new Date(a.date) - new Date(b.date));

  renderChart(data);

  const container = document.getElementById("history");
  container.innerHTML = "<h3>Historik</h3>";

  data.slice().reverse().forEach(e => {
    const score = e.energy + e.focus + e.mood;

    const div = document.createElement("div");
    div.className = "entry";

    const editBtn = document.createElement("button");
    editBtn.textContent = "✏️";
    editBtn.onclick = () => editEntry(e);

    const delBtn = document.createElement("button");
    delBtn.textContent = "🗑️";
    delBtn.className = "danger";
    delBtn.onclick = () => deleteEntry(e.date);

    div.innerHTML = `
      <strong>${e.date}</strong> — ⭐ ${score}<br>
      ⚡ ${e.energy} | 🎯 ${e.focus} | 😊 ${e.mood}
    `;

    div.appendChild(editBtn);
    div.appendChild(delBtn);

    container.appendChild(div);
  });
}

// events
saveBtn.addEventListener("click", saveEntry);
exportBtn.addEventListener("click", exportExcel);

render();
</script>

</body>
</html>
