<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #0f172a;
  color: white;
  padding: 16px;
}

h1 { text-align: center; }

.card {
  background: #1e293b;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 16px;
}

input[type="range"] {
  width: 100%;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-top: 8px;
}

.primary { background: #3b82f6; color: white; }
.danger { background: #ef4444; color: white; }

.entry {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>📊 Tracker</h1>

<div class="card">
  <input type="date" id="date">

  <label>Energi: <span id="energyVal">5</span></label>
  <input type="range" id="energy" min="1" max="10" value="5">

  <label>Fokus: <span id="focusVal">5</span></label>
  <input type="range" id="focus" min="1" max="10" value="5">

  <label>Humör: <span id="moodVal">5</span></label>
  <input type="range" id="mood" min="1" max="10" value="5">

  <button class="primary" onclick="saveEntry()">💾 Spara</button>
  <button onclick="exportExcel()">⬇️ Excel</button>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div id="history"></div>

<script>
const dateEl = document.getElementById("date");
dateEl.value = new Date().toISOString().split("T")[0];

const energy = document.getElementById("energy");
const focus = document.getElementById("focus");
const mood = document.getElementById("mood");

energy.oninput = () => energyVal.innerText = energy.value;
focus.oninput = () => focusVal.innerText = focus.value;
mood.oninput = () => moodVal.innerText = mood.value;

function getData() {
  return JSON.parse(localStorage.getItem("trackerData")) || [];
}

function saveData(data) {
  localStorage.setItem("trackerData", JSON.stringify(data));
}

function saveEntry() {
  const entry = {
    date: dateEl.value,
    energy: energy.value,
    focus: focus.value,
    mood: mood.value
  };

  let data = getData();
  const i = data.findIndex(d => d.date === entry.date);

  if (i >= 0) data[i] = entry;
  else data.push(entry);

  saveData(data);
  render();
}

function deleteEntry(date) {
  saveData(getData().filter(d => d.date !== date));
  render();
}

function editEntry(e) {
  dateEl.value = e.date;
  energy.value = e.energy;
  focus.value = e.focus;
  mood.value = e.mood;

  energyVal.innerText = e.energy;
  focusVal.innerText = e.focus;
  moodVal.innerText = e.mood;

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function exportExcel() {
  const data = getData();
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Tracker");
  XLSX.writeFile(wb, "tracker.xlsx");
}

let chart;

function renderChart(data) {
  const ctx = document.getElementById("chart");

  const labels = data.map(d => d.date);
  const energyData = data.map(d => d.energy);
  const focusData = data.map(d => d.focus);
  const moodData = data.map(d => d.mood);

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Energi", data: energyData },
        { label: "Fokus", data: focusData },
        { label: "Humör", data: moodData }
      ]
    }
  });
}

function render() {
  const data = getData().sort((a,b)=>a.date.localeCompare(b.date));

  renderChart(data);

  const container = document.getElementById("history");
  container.innerHTML = "<h3>Historik</h3>";

  data.slice().reverse().forEach(e => {
    const score = Number(e.energy)+Number(e.focus)+Number(e.mood);

    const div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <strong>${e.date}</strong> — ⭐ ${score}<br>
      ⚡ ${e.energy} | 🎯 ${e.focus} | 😊 ${e.mood}<br>
      <button onclick='editEntry(${JSON.stringify(e)})'>✏️</button>
      <button class="danger" onclick="deleteEntry('${e.date}')">🗑️</button>
    `;

    container.appendChild(div);
  });
}

render();
</script>

</body>
</html>
