<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #0f172a;
  color: white;
  padding: 16px;
}

.card {
  background: #1e293b;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 16px;
}

.highlight {
  border: 2px solid gold;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-top: 8px;
}

.primary { background: #3b82f6; }
.danger { background: #ef4444; }

.entry {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>📊 Tracker</h2>

<div class="card">
  <input type="date" id="date">

  <label>Energi: <span id="energyVal">5</span></label>
  <input type="range" id="energy" min="1" max="10" value="5">

  <label>Fokus: <span id="focusVal">5</span></label>
  <input type="range" id="focus" min="1" max="10" value="5">

  <label>Humör: <span id="moodVal">5</span></label>
  <input type="range" id="mood" min="1" max="10" value="5">

  <button class="primary" onclick="saveEntry()">💾 Spara</button>
  <button onclick="exportExcel()">⬇️ Excel</button>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div class="card" id="insights"></div>

<div id="history"></div>

<script>
const dateEl = document.getElementById("date");
dateEl.value = new Date().toISOString().split("T")[0];

const energy = document.getElementById("energy");
const focus = document.getElementById("focus");
const mood = document.getElementById("mood");

energy.oninput = () => energyVal.innerText = energy.value;
focus.oninput = () => focusVal.innerText = focus.value;
mood.oninput = () => moodVal.innerText = mood.value;

function getData() {
  return JSON.parse(localStorage.getItem("trackerData")) || [];
}

function saveData(data) {
  localStorage.setItem("trackerData", JSON.stringify(data));
}

function saveEntry() {
  const entry = {
    date: dateEl.value,
    energy: Number(energy.value),
    focus: Number(focus.value),
    mood: Number(mood.value)
  };

  let data = getData();
  const i = data.findIndex(d => d.date === entry.date);

  if (i >= 0) data[i] = entry;
  else data.push(entry);

  saveData(data);
  render();
}

function deleteEntry(date) {
  saveData(getData().filter(d => d.date !== date));
  render();
}

function editEntry(e) {
  dateEl.value = e.date;
  energy.value = e.energy;
  focus.value = e.focus;
  mood.value = e.mood;

  energyVal.innerText = e.energy;
  focusVal.innerText = e.focus;
  moodVal.innerText = e.mood;

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function exportExcel() {
  const data = getData();
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Tracker");
  XLSX.writeFile(wb, "tracker.xlsx");
}

// 📈 Moving average (trend)
function movingAvg(arr, window=3) {
  return arr.map((_, i) => {
    const start = Math.max(0, i - window + 1);
    const subset = arr.slice(start, i + 1);
    return subset.reduce((a,b)=>a+b,0) / subset.length;
  });
}

// 🧠 Insights
function generateInsights(data) {
  if (data.length < 3) return "Logga några dagar först 👇";

  let highEnergy = data.filter(d => d.energy > 7);
  let lowEnergy = data.filter(d => d.energy <= 7);

  let avgFocusHigh = highEnergy.reduce((a,b)=>a+b.focus,0) / (highEnergy.length||1);
  let avgFocusLow = lowEnergy.reduce((a,b)=>a+b.focus,0) / (lowEnergy.length||1);

  let text = "";

  if (avgFocusHigh > avgFocusLow) {
    text += "👉 Du har högre fokus när energi > 7<br>";
  }

  const best = data.reduce((a,b)=>
    (a.energy+a.focus+a.mood) > (b.energy+b.focus+b.mood) ? a : b
  );

  text += `🌟 Bästa dag: ${best.date}`;

  return text;
}

let chart;

function renderChart(data) {
  const ctx = document.getElementById("chart");

  const labels = data.map(d => d.date);
  const energyData = data.map(d => d.energy);
  const focusData = data.map(d => d.focus);
  const moodData = data.map(d => d.mood);

  const energyTrend = movingAvg(energyData);
  const focusTrend = movingAvg(focusData);
  const moodTrend = movingAvg(moodData);

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Energi", data: energyData },
        { label: "Energi trend", data: energyTrend, borderDash:[5,5] },
        { label: "Fokus", data: focusData },
        { label: "Fokus trend", data: focusTrend, borderDash:[5,5] },
        { label: "Humör", data: moodData },
        { label: "Humör trend", data: moodTrend, borderDash:[5,5] }
      ]
    }
  });
}

function render() {
  const data = getData().sort((a,b)=>a.date.localeCompare(b.date));

  renderChart(data);

  document.getElementById("insights").innerHTML = generateInsights(data);

  const best = data.reduce((a,b)=>
    (a.energy+a.focus+a.mood) > (b.energy+b.focus+b.mood) ? a : b
  , data[0]);

  const container = document.getElementById("history");
  container.innerHTML = "<h3>Historik</h3>";

  data.slice().reverse().forEach(e => {
    const score = e.energy + e.focus + e.mood;

    const div = document.createElement("div");
    div.className = "entry";

    if (best && e.date === best.date) div.classList.add("highlight");

    div.innerHTML = `
      <strong>${e.date}</strong> — ⭐ ${score}<br>
      ⚡ ${e.energy} | 🎯 ${e.focus} | 😊 ${e.mood}<br>
      <button onclick='editEntry(${JSON.stringify(e)})'>✏️</button>
      <button class="danger" onclick="deleteEntry('${e.date}')">🗑️</button>
    `;

    container.appendChild(div);
  });
}

render();
</script>

</body>
</html>
