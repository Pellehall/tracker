<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #0f172a;
  color: white;
  padding: 16px;
}

h1 { text-align: center; }

.card {
  background: #1e293b;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 16px;
}

input[type="range"] { width: 100%; }

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

button:hover { opacity: 0.9; }

.primary { background: #3b82f6; color: white; width: 100%; margin-top: 8px; }
.danger { background: #ef4444; color: white; }

.entry {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}

.row button {
  flex: 1;
  background: #334155;
  color: white;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #111827;
  color: white;
  padding: 12px 18px;
  border-radius: 12px;
  opacity: 0;
  transition: 0.3s;
  pointer-events: none;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-10px);
}
</style>
</head>

<body>

<h1>📊 Tracker</h1>

<div class="card">

  <div class="row">
    <button id="prevDay">⬅️</button>

    <input type="date" id="date" style="flex:2;">

    <button id="nextDay">➡️</button>
  </div>

  <label>Energi: <span id="energyVal">5</span></label>
  <input type="range" id="energy" min="1" max="10" value="5">

  <label>Fokus: <span id="focusVal">5</span></label>
  <input type="range" id="focus" min="1" max="10" value="5">

  <label>Humör: <span id="moodVal">5</span></label>
  <input type="range" id="mood" min="1" max="10" value="5">

  <button class="primary" id="saveBtn">💾 Spara</button>
  <button id="exportBtn">⬇️ Excel</button>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div id="history"></div>

<div id="toast"></div>

<script>
const dateEl = document.getElementById("date");
const energy = document.getElementById("energy");
const focus = document.getElementById("focus");
const mood = document.getElementById("mood");

const energyVal = document.getElementById("energyVal");
const focusVal = document.getElementById("focusVal");
const moodVal = document.getElementById("moodVal");

const toast = document.getElementById("toast");

dateEl.value = new Date().toISOString().split("T")[0];

// toast system
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

// sliders
energy.oninput = () => energyVal.innerText = energy.value;
focus.oninput = () => focusVal.innerText = focus.value;
mood.oninput = () => moodVal.innerText = mood.value;

// date helpers
function changeDate(offset) {
  const d = new Date(dateEl.value);
  d.setDate(d.getDate() + offset);
  dateEl.value = d.toISOString().split("T")[0];
}

// storage
function getData() {
  try {
    return JSON.parse(localStorage.getItem("trackerData")) || [];
  } catch {
    return [];
  }
}

function saveData(data) {
  localStorage.setItem("trackerData", JSON.stringify(data));
}

// save
function saveEntry() {
  const entry = {
    date: dateEl.value,
    energy: Number(energy.value),
    focus: Number(focus.value),
    mood: Number(mood.value)
  };

  let data = getData();
  const i = data.findIndex(d => d.date === entry.date);

  if (i >= 0) data[i] = entry;
  else data.push(entry);

  saveData(data);
  render();

  showToast("Sparat ✅");
}

// delete/edit
function deleteEntry(date) {
  saveData(getData().filter(d => d.date !== date));
  render();
  showToast("Borttaget 🗑️");
}

function editEntry(e) {
  dateEl.value = e.date;
  energy.value = e.energy;
  focus.value = e.focus;
  mood.value = e.mood;

  energyVal.innerText = e.energy;
  focusVal.innerText = e.focus;
  moodVal.innerText = e.mood;

  window.scrollTo({ top: 0, behavior: "smooth" });
}

// excel (förbättrad)
function exportExcel() {
  const raw = getData();

  const data = raw.map(e => ({
    Datum: e.date,
    Energi: e.energy,
    Fokus: e.focus,
    Humör: e.mood,
    Total: e.energy + e.focus + e.mood
  }));

  const ws = XLSX.utils.json_to_sheet(data);

  ws["!cols"] = [
    { wch: 12 },
    { wch: 8 },
    { wch: 8 },
    { wch: 8 },
    { wch: 8 }
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Tracker");

  XLSX.writeFile(wb, "tracker.xlsx");

  showToast("Export klar 📊");
}

// chart
let chart;

function renderChart(data) {
  const ctx = document.getElementById("chart");

  const sorted = data.sort((a, b) => new Date(a.date) - new Date(b.date));

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: sorted.map(d => d.date),
      datasets: [
        { label: "Energi", data: sorted.map(d => d.energy), borderColor: "#3b82f6" },
        { label: "Fokus", data: sorted.map(d => d.focus), borderColor: "#22c55e" },
        { label: "Humör", data: sorted.map(d => d.mood), borderColor: "#f59e0b" }
      ]
    },
    options: {
      responsive: true,
      scales: { y: { min: 0, max: 10 } }
    }
  });
}

// render
function render() {
  const data = getData().sort((a, b) => new Date(a.date) - new Date(b.date));

  renderChart(data);

  const container = document.getElementById("history");
  container.innerHTML = "<h3>Historik</h3>";

  data.slice().reverse().forEach(e => {
    const score = e.energy + e.focus + e.mood;

    const div = document.createElement("div");
    div.className = "entry";

    const editBtn = document.createElement("button");
    editBtn.textContent = "✏️";
    editBtn.onclick = () => editEntry(e);

    const delBtn = document.createElement("button");
    delBtn.textContent = "🗑️";
    delBtn.className = "danger";
    delBtn.onclick = () => deleteEntry(e.date);

    div.innerHTML = `
      <strong>${e.date}</strong> — ⭐ ${score}<br>
      ⚡ ${e.energy} | 🎯 ${e.focus} | 😊 ${e.mood}
    `;

    div.appendChild(editBtn);
    div.appendChild(delBtn);

    container.appendChild(div);
  });
}

// events
document.getElementById("saveBtn").onclick = saveEntry;
document.getElementById("exportBtn").onclick = exportExcel;

document.getElementById("prevDay").onclick = () => {
  changeDate(-1);
};

document.getElementById("nextDay").onclick = () => {
  changeDate(1);
};

render();
</script>

</body>
</html>
